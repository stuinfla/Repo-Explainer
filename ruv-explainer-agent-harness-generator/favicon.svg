<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" role="img" aria-label="MetaHarness — MH stamped coin">
  <!-- Hand-authored foundry/mint 'MH' stamped coin [P5.2 / locked in P2].
       Molten amber poured into copper, struck on warm-charcoal. Zero cyan. -->
  <defs>
    <radialGradient id="molten" cx="36%" cy="30%" r="78%">
      <stop offset="0%"  stop-color="#ffce7a"/>
      <stop offset="38%" stop-color="#ff9e2c"/>
      <stop offset="74%" stop-color="#c2703a"/>
      <stop offset="100%" stop-color="#8a4a26"/>
    </radialGradient>
    <linearGradient id="rim" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#ffce7a"/>
      <stop offset="100%" stop-color="#6e3a1d"/>
    </linearGradient>
  </defs>

  <!-- charcoal field -->
  <rect width="32" height="32" rx="6" fill="#16120e"/>
  <!-- struck coin -->
  <circle cx="16" cy="16" r="13" fill="url(#rim)"/>
  <circle cx="16" cy="16" r="11.4" fill="url(#molten)"/>
  <!-- inner emboss ring -->
  <circle cx="16" cy="16" r="11.4" fill="none" stroke="#1a1206" stroke-opacity="0.35" stroke-width="0.8"/>

  <!-- 'MH' monogram, pressed (dark) with a top highlight stroke -->
  <g fill="#1a1206" font-family="Arial Narrow, sans-serif" font-weight="900"
     font-size="13" text-anchor="middle">
    <text x="16" y="20.6" letter-spacing="-0.5">MH</text>
  </g>
  <g fill="none" stroke="#ffe6b0" stroke-opacity="0.5" stroke-width="0.4">
    <text x="16" y="20.2" font-family="Arial Narrow, sans-serif" font-weight="900"
          font-size="13" text-anchor="middle" letter-spacing="-0.5">MH</text>
  </g>
</svg>
