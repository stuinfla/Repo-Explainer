<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 420" width="900" height="420" role="img" aria-labelledby="s07-title s07-desc" style="width:100%;height:auto;font-family:'IBM Plex Sans',sans-serif;">
  <title id="s07-title">The fastest start: one command, four questions, your own tool</title>
  <desc id="s07-desc">A three-step flow. Run npx metaharness --wizard, answer a few plain questions (name, template, host, description), and you get your own npx your-name command. The wizard also prints the exact command so you can skip the questions next time.</desc>

  <defs>
    <marker id="s07-arrow" viewBox="0 0 12 12" refX="9" refY="6" markerWidth="10" markerHeight="10" orient="auto-start-reverse">
      <path d="M1 1 L10 6 L1 11 Z" fill="#e0a96d"/>
    </marker>
  </defs>

  <!-- panel -->
  <rect x="0" y="0" width="900" height="420" rx="16" fill="#1a1512"/>
  <rect x="0.75" y="0.75" width="898.5" height="418.5" rx="15.25" fill="none" stroke="#3a2f1f" stroke-width="1.5"/>

  <!-- header -->
  <text x="40" y="50" font-family="'IBM Plex Sans',sans-serif" font-size="22" font-weight="600" fill="#f3e9da">The fastest start</text>
  <text x="40" y="76" font-family="'IBM Plex Sans',sans-serif" font-size="15" fill="#9c8b72">One command, four questions, a working package &#8212; in your own name.</text>

  <!-- STEP 1 -->
  <g>
    <rect x="40" y="118" width="240" height="150" rx="14" fill="#2a2018" stroke="#e0a96d" stroke-width="1.25"/>
    <circle cx="66" cy="146" r="13" fill="#2a2018" stroke="#c8814f" stroke-width="1.5"/>
    <text x="66" y="151" text-anchor="middle" font-family="'IBM Plex Sans',sans-serif" font-size="14" font-weight="600" fill="#e0a96d">1</text>
    <text x="90" y="151" font-family="'IBM Plex Sans',sans-serif" font-size="16" font-weight="600" fill="#f3e9da">Run the wizard</text>
    <rect x="60" y="170" width="200" height="34" rx="7" fill="#1a1512" stroke="#3a2f1f" stroke-width="1"/>
    <text x="160" y="192" text-anchor="middle" font-family="'IBM Plex Mono',monospace" font-size="13" fill="#e0a96d">npx metaharness --wizard</text>
    <text x="160" y="232" text-anchor="middle" font-family="'IBM Plex Sans',sans-serif" font-size="13" fill="#9c8b72">Nothing to set up.</text>
    <text x="160" y="250" text-anchor="middle" font-family="'IBM Plex Sans',sans-serif" font-size="13" fill="#9c8b72">npx fetches it for you.</text>
  </g>

  <!-- STEP 2 -->
  <g>
    <rect x="330" y="118" width="240" height="150" rx="14" fill="#2a2018" stroke="#e0a96d" stroke-width="1.25"/>
    <circle cx="356" cy="146" r="13" fill="#2a2018" stroke="#c8814f" stroke-width="1.5"/>
    <text x="356" y="151" text-anchor="middle" font-family="'IBM Plex Sans',sans-serif" font-size="14" font-weight="600" fill="#e0a96d">2</text>
    <text x="380" y="151" font-family="'IBM Plex Sans',sans-serif" font-size="16" font-weight="600" fill="#f3e9da">Answer 4 questions</text>

    <text x="356" y="180" font-family="'IBM Plex Sans',sans-serif" font-size="13.5" fill="#c8814f">&#8226;</text>
    <text x="372" y="180" font-family="'IBM Plex Sans',sans-serif" font-size="13.5" fill="#f3e9da">a name</text>
    <text x="356" y="204" font-family="'IBM Plex Sans',sans-serif" font-size="13.5" fill="#c8814f">&#8226;</text>
    <text x="372" y="204" font-family="'IBM Plex Sans',sans-serif" font-size="13.5" fill="#f3e9da">a template</text>
    <text x="356" y="228" font-family="'IBM Plex Sans',sans-serif" font-size="13.5" fill="#c8814f">&#8226;</text>
    <text x="372" y="228" font-family="'IBM Plex Sans',sans-serif" font-size="13.5" fill="#f3e9da">where it will run (host)</text>
    <text x="356" y="252" font-family="'IBM Plex Sans',sans-serif" font-size="13.5" fill="#c8814f">&#8226;</text>
    <text x="372" y="252" font-family="'IBM Plex Sans',sans-serif" font-size="13.5" fill="#f3e9da">a one-line description</text>
  </g>

  <!-- STEP 3 -->
  <g>
    <rect x="620" y="118" width="240" height="150" rx="14" fill="#2a2018" stroke="#c8814f" stroke-width="2"/>
    <circle cx="646" cy="146" r="13" fill="#2a2018" stroke="#c8814f" stroke-width="1.5"/>
    <text x="646" y="151" text-anchor="middle" font-family="'IBM Plex Sans',sans-serif" font-size="14" font-weight="600" fill="#e0a96d">3</text>
    <text x="670" y="151" font-family="'IBM Plex Sans',sans-serif" font-size="16" font-weight="600" fill="#f3e9da">You get your tool</text>
    <rect x="640" y="170" width="200" height="34" rx="7" fill="#1a1512" stroke="#c8814f" stroke-width="1.25"/>
    <text x="740" y="192" text-anchor="middle" font-family="'IBM Plex Mono',monospace" font-size="13" fill="#e0a96d">npx &lt;your-name&gt;</text>
    <text x="740" y="232" text-anchor="middle" font-family="'IBM Plex Sans',sans-serif" font-size="13" fill="#9c8b72">Your brand, your skills,</text>
    <text x="740" y="250" text-anchor="middle" font-family="'IBM Plex Sans',sans-serif" font-size="13" fill="#9c8b72">your own command.</text>
  </g>

  <!-- step arrows -->
  <line x1="280" y1="193" x2="326" y2="193" stroke="#e0a96d" stroke-width="2.25" marker-end="url(#s07-arrow)"/>
  <line x1="570" y1="193" x2="616" y2="193" stroke="#e0a96d" stroke-width="2.25" marker-end="url(#s07-arrow)"/>

  <!-- skip-next-time loop -->
  <rect x="40" y="312" width="820" height="68" rx="12" fill="#221b14" stroke="#3a2f1f" stroke-width="1.25"/>
  <text x="64" y="340" font-family="'IBM Plex Sans',sans-serif" font-size="14" font-weight="600" fill="#e0a96d">Bonus: skip the questions next time</text>
  <text x="64" y="364" font-family="'IBM Plex Sans',sans-serif" font-size="13.5" fill="#d6c5ac">The wizard prints the exact <tspan font-family="'IBM Plex Mono',monospace" fill="#f3e9da">npx metaharness &#8230;</tspan> command it just ran &#8212; paste it to repeat in one line.</text>
</svg>
