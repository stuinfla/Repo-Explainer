<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 520" width="100%" role="img" aria-labelledby="uc6-title uc6-desc" style="width:100%;height:auto;font-family:'IBM Plex Sans',sans-serif">
  <title id="uc6-title">Use case 6 — Darwin Mode: the harness quietly improves itself</title>
  <desc id="uc6-desc">Darwin Mode is a safe self-improvement loop. The harness changes one of its own settings, tests that change in an isolated sandbox with no internet and no API key, and keeps it only if it measurably helped. The AI model stays frozen; only the wrapper evolves. Run npm run evolve to start; add --no-darwin to opt out.</desc>
  <defs>
    <marker id="uc6-arrow" markerWidth="13" markerHeight="13" refX="9" refY="6" orient="auto">
      <path d="M1,1 L11,6 L1,11 Z" fill="#ff9e2c"/>
    </marker>
    <marker id="uc6-arrow-back" markerWidth="13" markerHeight="13" refX="9" refY="6" orient="auto">
      <path d="M1,1 L11,6 L1,11 Z" fill="#c2703a"/>
    </marker>
    <style>
      .panel{fill:#241d15}
      .node{fill:#2a2018;stroke:#c2703a;stroke-width:1.4}
      .stage{fill:#9c8b72;font-size:13px;letter-spacing:.16em;text-transform:uppercase}
      .head{fill:#f3e8d8;font-size:19px;font-weight:600}
      .body{fill:#d6c5ac;font-size:15px}
      .mono{font-family:'IBM Plex Mono',ui-monospace,monospace;fill:#ffb650;font-size:14px}
      .flow{stroke:#ff9e2c;stroke-width:2.2;fill:none}
      .flow-back{stroke:#c2703a;stroke-width:1.8;fill:none;stroke-dasharray:6 4}
      .pill{fill:#ff9e2c}
      .pilltxt{fill:#1a1206;font-size:13px;font-weight:600}
      .frozen{fill:#1d1812;stroke:#3a2f1f;stroke-width:1.2}
    </style>
  </defs>

  <rect x="0" y="0" width="1180" height="520" rx="18" class="panel"/>
  <rect x="0.7" y="0.7" width="1178.6" height="518.6" rx="18" fill="none" stroke="#3a2f1f" stroke-width="1.4"/>

  <text x="40" y="52" fill="#ff9e2c" font-size="15" letter-spacing=".2em">USE CASE 6</text>
  <text x="40" y="84" class="head" font-size="26">"Let the harness quietly improve itself (Darwin Mode)"</text>

  <!-- Stage 1: THE LOOP — try a small tweak -->
  <rect x="40" y="130" width="250" height="300" rx="12" class="node"/>
  <text x="60" y="162" class="stage">Step 1 — Try</text>
  <text x="60" y="200" class="head" font-size="17">Try a small</text>
  <text x="60" y="222" class="head" font-size="17">tweak</text>
  <text x="60" y="262" class="body" font-size="13">The harness changes</text>
  <text x="60" y="284" class="body" font-size="13">one of its own settings</text>
  <text x="60" y="306" class="body" font-size="13">— routing rules, prompt</text>
  <text x="60" y="328" class="body" font-size="13">wording, skill order.</text>
  <rect x="60" y="350" width="210" height="52" rx="10" fill="#1d1812" stroke="#c2703a" stroke-width="1.2"/>
  <text x="75" y="375" class="mono" font-size="12">npm run evolve</text>
  <text x="75" y="395" class="body" font-size="11.5" fill="#9c8b72">starts the loop</text>

  <line x1="298" y1="280" x2="342" y2="280" class="flow" marker-end="url(#uc6-arrow)"/>

  <!-- Stage 2: SANDBOX TEST -->
  <rect x="350" y="130" width="250" height="300" rx="12" class="node"/>
  <text x="370" y="162" class="stage">Step 2 — Test</text>
  <text x="370" y="200" class="head" font-size="17">Test it safely</text>
  <text x="370" y="222" class="head" font-size="17">in a sandbox</text>
  <text x="370" y="262" class="body" font-size="13">The tweak runs inside</text>
  <text x="370" y="284" class="body" font-size="13">an isolated sandbox —</text>
  <text x="370" y="306" class="body" font-size="13">no internet, no API key,</text>
  <text x="370" y="328" class="body" font-size="13">no side effects.</text>
  <rect x="370" y="350" width="210" height="52" rx="10" fill="#1d1812" stroke="#ff9e2c" stroke-width="1.3"/>
  <text x="386" y="372" class="body" font-size="13" fill="#ffb650">isolated · read-only</text>
  <text x="386" y="392" class="body" font-size="12" fill="#9c8b72">safe gate, always on</text>

  <line x1="608" y1="280" x2="652" y2="280" class="flow" marker-end="url(#uc6-arrow)"/>

  <!-- Stage 3: KEEP OR DISCARD -->
  <rect x="660" y="130" width="250" height="300" rx="12" class="node"/>
  <text x="680" y="162" class="stage">Step 3 — Keep?</text>
  <text x="680" y="200" class="head" font-size="17">Keep only what</text>
  <text x="680" y="222" class="head" font-size="17">measurably helps</text>
  <text x="680" y="262" class="body" font-size="13">Results are compared</text>
  <text x="680" y="284" class="body" font-size="13">against a real goal.</text>
  <rect x="680" y="302" width="210" height="40" rx="8" fill="#1d1812" stroke="#c2703a" stroke-width="1"/>
  <text x="694" y="326" class="body" font-size="12" fill="#ffb650">improved → keep it</text>
  <rect x="680" y="350" width="210" height="40" rx="8" fill="#1d1812" stroke="#3a2f1f" stroke-width="1"/>
  <text x="694" y="374" class="body" font-size="12" fill="#9c8b72">no change → discard</text>
  <text x="680" y="418" class="body" font-size="12" fill="#9c8b72">then loop again</text>

  <!-- feedback arrow looping back — curves below the stages -->
  <path d="M786,430 C786,470 590,480 400,470 C300,466 200,460 181,432" class="flow-back" marker-end="url(#uc6-arrow-back)"/>
  <text x="460" y="494" fill="#c2703a" font-size="12" font-style="italic">loop · model frozen · only the wrapper evolves</text>

  <line x1="918" y1="280" x2="962" y2="280" class="flow" marker-end="url(#uc6-arrow)"/>

  <!-- Stage 4: RESULT -->
  <rect x="970" y="130" width="170" height="300" rx="12" fill="#2a2018" stroke="#ff9e2c" stroke-width="1.8"/>
  <rect x="986" y="150" width="138" height="26" rx="13" class="pill"/>
  <text x="1004" y="168" class="pilltxt">PAYOFF</text>
  <text x="990" y="210" class="head" font-size="16">A harness</text>
  <text x="990" y="232" class="head" font-size="16">that gets</text>
  <text x="990" y="254" class="head" font-size="16">better on</text>
  <text x="990" y="276" class="head" font-size="16">its own</text>
  <rect x="990" y="292" width="130" height="56" rx="9" fill="#1a1206" stroke="#3a2f1f" stroke-width="1.2"/>
  <text x="1055" y="316" class="body" font-size="11.5" text-anchor="middle" fill="#9c8b72">model frozen</text>
  <text x="1055" y="336" class="body" font-size="11.5" text-anchor="middle" fill="#ffb650">wrapper evolves</text>
  <text x="990" y="372" class="body" font-size="12.5">Opt out anytime:</text>
  <text x="990" y="394" class="mono" font-size="11">--no-darwin</text>
  <text x="990" y="420" class="body" font-size="11.5" fill="#9c8b72">treat as experimental</text>
</svg>
