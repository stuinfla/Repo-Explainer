<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 956 956" width="956" height="956" role="img" aria-labelledby="d-title d-desc">
  <title id="d-title">demorepo — Architecture</title>
  <desc id="d-desc">demorepo module dependency map: 10 components across node wired by 15 internal dependencies, drawn as a layered graph where each arrow points from a module to what it depends on (top entry points down to shared foundation libraries), with core as the core module the most others depend on.</desc>
  <metadata><![CDATA[
Module dependency map: ENTRY [cli, web-ui, api] → CORE [core, router] → SERVICES [store, models, auth] → FOUNDATION [types, utils]; 15 real dependency edges, core = core.
]]></metadata>
