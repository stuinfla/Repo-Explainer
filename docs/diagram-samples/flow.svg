<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 313 416" width="313" height="416" role="img" aria-labelledby="d-title d-desc">
  <title id="d-title">demorepo — Process / Data Flow</title>
  <desc id="d-desc">demorepo — Process / Data Flow: 1 · Install ↓ 2 · Build ↓ 3 · Run ↓ 4 · Verify</desc>
  <defs>
    <marker id="ah" markerWidth="9" markerHeight="7" refX="8.5" refY="3.5" orient="auto">
      <polygon class="ah" points="0 0, 9 3.5, 0 7" fill="#555555"/>
    </marker>
    <style>
      .box { fill: #f8f9fa; stroke: #333333; stroke-width: 1.5px; }
      .lbl { font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; font-size: 14px; font-weight: 500; fill: #1a1a1a; }
      .sub { font-size: 11px; font-weight: 400; opacity: .8; }
      .arr { stroke: #555555; stroke-width: 1.5px; fill: none; }
      .band { font-family: system-ui, sans-serif; font-size: 11px; font-weight: 700; fill: #4a90d9; letter-spacing: .04em; }
      .ttl { font-family: system-ui, sans-serif; font-size: 15px; font-weight: 700; fill: #1a1a1a; }
      @media (prefers-color-scheme: dark) {
        .box { fill: #2d333b; stroke: #768390; }
        .lbl { fill: #e6edf3; }
        .arr { stroke: #768390; }
        .ah  { fill: #768390; }
        .ttl { fill: #e6edf3; }
        .band { fill: #6cb6ff; }
      }
    </style>
  </defs>
  <text class="ttl" x="156.5" y="40" text-anchor="middle">demorepo — Process / Data Flow</text>
  <line class="arr" x1="156.5" y1="108" x2="156.5" y2="155" marker-end="url(#ah)"/>
  <line class="arr" x1="156.5" y1="202" x2="156.5" y2="249" marker-end="url(#ah)"/>
  <line class="arr" x1="156.5" y1="296" x2="156.5" y2="343" marker-end="url(#ah)"/>
  <g><rect class="box" x="97.5" y="62" width="118" height="46" rx="5"/><text class="lbl" x="156.5" y="80" text-anchor="middle" dominant-baseline="middle">1 · Install</text><text class="lbl sub" x="156.5" y="97" text-anchor="middle" dominant-baseline="middle">npm install</text></g>
  <g><rect class="box" x="94.5" y="156" width="124" height="46" rx="5"/><text class="lbl" x="156.5" y="174" text-anchor="middle" dominant-baseline="middle">2 · Build</text><text class="lbl sub" x="156.5" y="191" text-anchor="middle" dominant-baseline="middle">npm run build</text></g>
  <g><rect class="box" x="108.5" y="250" width="96" height="46" rx="5"/><text class="lbl" x="156.5" y="268" text-anchor="middle" dominant-baseline="middle">3 · Run</text><text class="lbl sub" x="156.5" y="285" text-anchor="middle" dominant-baseline="middle">mycli</text></g>
  <g><rect class="box" x="101.5" y="344" width="110" height="46" rx="5"/><text class="lbl" x="156.5" y="362" text-anchor="middle" dominant-baseline="middle">4 · Verify</text><text class="lbl sub" x="156.5" y="379" text-anchor="middle" dominant-baseline="middle">npm test</text></g>
