<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 560" width="100%" role="img" aria-labelledby="s02-t s02-d" style="max-width:1000px;height:auto;font-family:'Inter','IBM Plex Sans',system-ui,sans-serif;">
  <title id="s02-t">What ruqu actually gives you: three things</title>
  <desc id="s02-d">ruqu is a pure-Rust quantum simulator compiled to native and WebAssembly. It gives you three things: a state-vector simulator (the imitation quantum computer, ~25 qubits in browser, 32 in native Rust), ready-made algorithms (VQE, Grover, QAOA, surface-code error correction), and a coherence engine that decides PERMIT, DEFER, or DENY before each operation.</desc>
  <defs>
    <linearGradient id="s02-bg" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#181233"/><stop offset="1" stop-color="#120e26"/></linearGradient>
    <linearGradient id="s02-mag" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#ff3df0"/><stop offset="1" stop-color="#8b5cff"/></linearGradient>
    <radialGradient id="s02-orb" cx="36%" cy="30%" r="75%"><stop offset="0" stop-color="#ff7bf6"/><stop offset="55%" stop-color="#ff3df0"/><stop offset="100%" stop-color="#8b5cff"/></radialGradient>
  </defs>
  <rect width="1000" height="560" rx="16" fill="url(#s02-bg)"/>
  <text x="500" y="40" text-anchor="middle" fill="#f3eefb" font-size="22" font-weight="700">One pure-Rust engine &#8594; runs in three places, gives you three things</text>

  <!-- one engine, three surfaces -->
  <rect x="300" y="64" width="400" height="48" rx="10" fill="#231a44" stroke="url(#s02-mag)" stroke-width="1.6"/>
  <text x="500" y="84" text-anchor="middle" fill="#f3eefb" font-size="13.5" font-weight="700">ruqu &#8212; one codebase, pure Rust (no Python, no C++)</text>
  <text x="500" y="103" text-anchor="middle" fill="#b9aee0" font-size="11.5">compiles to native &#38; WebAssembly (wasm32)</text>
  <!-- three surfaces -->
  <g font-size="11.5" font-family="'IBM Plex Mono',ui-monospace,monospace">
    <rect x="150" y="128" width="180" height="34" rx="7" fill="#140f2b" stroke="#39e8ff"/>
    <text x="240" y="150" text-anchor="middle" fill="#7df0ff">in a web page (WASM)</text>
    <rect x="410" y="128" width="180" height="34" rx="7" fill="#140f2b" stroke="#39e8ff"/>
    <text x="500" y="150" text-anchor="middle" fill="#7df0ff">npx @ruvector/ruqu</text>
    <rect x="670" y="128" width="180" height="34" rx="7" fill="#140f2b" stroke="#39e8ff"/>
    <text x="760" y="150" text-anchor="middle" fill="#7df0ff">inside a Rust program</text>
  </g>
  <path d="M500 112 L240 126 M500 112 L500 126 M500 112 L760 126" stroke="#4a3f70" stroke-width="1.2" fill="none"/>

  <!-- three things -->
  <text x="500" y="196" text-anchor="middle" fill="#9a8fc4" font-size="12.5" letter-spacing="2">THE THREE THINGS IT GIVES YOU</text>

  <!-- 1 simulator -->
  <rect x="40" y="214" width="296" height="318" rx="13" fill="#1d1640" stroke="#5a4d88" stroke-width="1.3"/>
  <circle cx="120" cy="260" r="26" fill="url(#s02-orb)"/>
  <ellipse cx="120" cy="260" rx="26" ry="9" fill="none" stroke="#39e8ff" stroke-width="1.1"/>
  <line x1="120" y1="260" x2="138" y2="240" stroke="#fff" stroke-width="2"/><circle cx="138" cy="240" r="2.4" fill="#fff"/>
  <text x="180" y="252" fill="#ff8cf2" font-size="15" font-weight="700">1 &#183; State-vector</text>
  <text x="180" y="272" fill="#ff8cf2" font-size="15" font-weight="700">simulator</text>
  <text x="60" y="310" fill="#d8cff0" font-size="12.5">The imitation quantum</text>
  <text x="60" y="328" fill="#d8cff0" font-size="12.5">computer itself &#8212; it tracks</text>
  <text x="60" y="346" fill="#d8cff0" font-size="12.5">every possible state at once.</text>
  <rect x="60" y="362" width="256" height="56" rx="8" fill="#140f2b" stroke="#3a2f66"/>
  <text x="74" y="384" fill="#9fb6ff" font-size="11.5" font-family="'IBM Plex Mono',ui-monospace,monospace">~25 qubits  browser / Node</text>
  <text x="74" y="404" fill="#9fb6ff" font-size="11.5" font-family="'IBM Plex Mono',ui-monospace,monospace">  32 qubits  native Rust</text>
  <text x="60" y="448" fill="#a99fce" font-size="11.5">Cost doubles with every</text>
  <text x="60" y="466" fill="#a99fce" font-size="11.5">qubit &#8212; that&#8217;s the ceiling.</text>

  <!-- 2 algorithms -->
  <rect x="352" y="214" width="296" height="318" rx="13" fill="#1d1640" stroke="#5a4d88" stroke-width="1.3"/>
  <text x="372" y="252" fill="#9fb6ff" font-size="15" font-weight="700">2 &#183; Ready-made</text>
  <text x="372" y="272" fill="#9fb6ff" font-size="15" font-weight="700">algorithms</text>
  <text x="372" y="300" fill="#d8cff0" font-size="12.5">Call them, don&#8217;t build them:</text>
  <g font-size="12">
    <rect x="372" y="312" width="256" height="40" rx="7" fill="#140f2b" stroke="#39e8ff"/>
    <text x="384" y="330" fill="#7df0ff" font-weight="700">VQE</text><text x="424" y="330" fill="#cdc2ee">chemistry &#183; lowest energy</text>
    <rect x="372" y="356" width="256" height="40" rx="7" fill="#140f2b" stroke="#39e8ff"/>
    <text x="384" y="374" fill="#7df0ff" font-weight="700">Grover</text><text x="438" y="374" fill="#cdc2ee">fast search</text>
    <rect x="372" y="400" width="256" height="40" rx="7" fill="#140f2b" stroke="#39e8ff"/>
    <text x="384" y="418" fill="#7df0ff" font-weight="700">QAOA</text><text x="432" y="418" fill="#cdc2ee">optimization / best split</text>
    <rect x="372" y="444" width="256" height="40" rx="7" fill="#140f2b" stroke="#39e8ff"/>
    <text x="384" y="462" fill="#7df0ff" font-weight="700">Surface code</text><text x="486" y="462" fill="#cdc2ee">error correction</text>
  </g>
  <text x="372" y="510" fill="#a99fce" font-size="11.5">The standard near-term toolkit.</text>

  <!-- 3 coherence -->
  <rect x="664" y="214" width="296" height="318" rx="13" fill="#1d1640" stroke="#ff3df0" stroke-width="1.5"/>
  <text x="684" y="252" fill="#ff5cf2" font-size="15" font-weight="700">3 &#183; Coherence</text>
  <text x="684" y="272" fill="#ff5cf2" font-size="15" font-weight="700">engine</text>
  <text x="684" y="296" fill="#ffd9f6" font-size="11" font-weight="700">ruv&#8217;s original idea</text>
  <text x="684" y="320" fill="#d8cff0" font-size="12.5">A classical &#8220;nervous system&#8221;</text>
  <text x="684" y="338" fill="#d8cff0" font-size="12.5">that watches the error pattern</text>
  <text x="684" y="356" fill="#d8cff0" font-size="12.5">and, before each operation,</text>
  <text x="684" y="374" fill="#d8cff0" font-size="12.5">asks: &#8220;is it still safe to act?&#8221;</text>
  <g font-family="'IBM Plex Mono',ui-monospace,monospace" font-size="12" font-weight="700">
    <rect x="684" y="392" width="80" height="34" rx="7" fill="#13351f" stroke="#3ddc84"/><text x="724" y="414" text-anchor="middle" fill="#5cffaa">PERMIT</text>
    <rect x="772" y="392" width="80" height="34" rx="7" fill="#3a3210" stroke="#ffc83d"/><text x="812" y="414" text-anchor="middle" fill="#ffd96b">DEFER</text>
    <rect x="860" y="392" width="80" height="34" rx="7" fill="#3a1422" stroke="#ff5c7a"/><text x="900" y="414" text-anchor="middle" fill="#ff8fa3">DENY</text>
  </g>
  <text x="684" y="456" fill="#a99fce" font-size="11.5">Exists in no mainstream</text>
  <text x="684" y="474" fill="#a99fce" font-size="11.5">toolkit. Turns a fragile</text>
  <text x="684" y="492" fill="#a99fce" font-size="11.5">experiment into a</text>
  <text x="684" y="510" fill="#a99fce" font-size="11.5">self-aware machine.</text>
</svg>
