<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 380" width="100%" role="img" aria-labelledby="uc6-t uc6-d" style="max-width:1000px;height:auto;font-family:'Inter','IBM Plex Sans',system-ui,sans-serif;">
  <title id="uc6-t">The cost-model planner: pick the right backend automatically</title>
  <desc id="uc6-d">A circuit too big for the obvious track-every-possibility method is handed to plan_execution. A cost model predicts memory, runtime, and fidelity, then routes the circuit to the cheapest viable backend of five: StateVector for exact small jobs, Stabilizer for Clifford-only circuits with millions of qubits, TensorNetwork, Clifford+T, or a real hardware profile. Decompose can split a circuit first.</desc>
  <defs>
    <linearGradient id="uc6-bg" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#181233"/><stop offset="1" stop-color="#120e26"/></linearGradient>
    <marker id="uc6-ar" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#8b5cff"/></marker>
  </defs>
  <rect width="1000" height="380" rx="16" fill="url(#uc6-bg)"/>
  <text x="500" y="36" text-anchor="middle" fill="#f3eefb" font-size="19" font-weight="700">The planner &#8212; route a big circuit to the cheapest viable engine</text>
  <text x="500" y="58" text-anchor="middle" fill="#7df0ff" font-size="11.5" font-family="'IBM Plex Mono',ui-monospace,monospace">plan_execution(&#38;circuit, &#38;PlannerConfig::default())  &#183;  decompose(&#38;circ, 25)</text>

  <!-- input -->
  <rect x="40" y="120" width="160" height="120" rx="10" fill="#1d1640" stroke="#5a4d88" stroke-width="1.3"/>
  <text x="120" y="150" text-anchor="middle" fill="#9fb6ff" font-size="13" font-weight="700">One circuit</text>
  <text x="120" y="172" text-anchor="middle" fill="#a99fce" font-size="11">too big for the</text>
  <text x="120" y="188" text-anchor="middle" fill="#a99fce" font-size="11">naive method</text>
  <text x="120" y="216" text-anchor="middle" fill="#ff8fa3" font-size="10.5">would run out of memory</text>

  <line x1="206" y1="180" x2="244" y2="180" stroke="#8b5cff" stroke-width="2.2" marker-end="url(#uc6-ar)"/>

  <!-- planner -->
  <rect x="252" y="108" width="190" height="144" rx="10" fill="#1d1640" stroke="#ff3df0" stroke-width="1.4"/>
  <text x="347" y="134" text-anchor="middle" fill="#ff5cf2" font-size="13" font-weight="700">cost-model planner</text>
  <text x="347" y="156" text-anchor="middle" fill="#d8cff0" font-size="11">predicts, per backend:</text>
  <g font-family="'IBM Plex Mono',ui-monospace,monospace" font-size="10.5">
    <rect x="270" y="166" width="154" height="22" rx="4" fill="#231a44" stroke="#39e8ff"/><text x="347" y="181" text-anchor="middle" fill="#bfe9ff">memory</text>
    <rect x="270" y="192" width="154" height="22" rx="4" fill="#231a44" stroke="#39e8ff"/><text x="347" y="207" text-anchor="middle" fill="#bfe9ff">runtime</text>
    <rect x="270" y="218" width="154" height="22" rx="4" fill="#231a44" stroke="#39e8ff"/><text x="347" y="233" text-anchor="middle" fill="#bfe9ff">fidelity</text>
  </g>

  <line x1="448" y1="180" x2="486" y2="180" stroke="#8b5cff" stroke-width="2.2" marker-end="url(#uc6-ar)"/>

  <!-- five backends -->
  <text x="745" y="92" text-anchor="middle" fill="#9a8fc4" font-size="12" font-weight="700">&#8230; routes to the cheapest of FIVE backends</text>
  <g font-size="11">
    <rect x="500" y="104" width="490" height="34" rx="7" fill="#231a44" stroke="#ff3df0" stroke-width="1.5"/><text x="516" y="125" fill="#ff8cf2" font-weight="700">StateVector</text><text x="640" y="125" fill="#cdc2ee">exact, small jobs (&#8804;25/32 qubits)</text><text x="930" y="125" fill="#5cffaa" font-size="10">&#9733; chosen</text>
    <rect x="500" y="142" width="490" height="34" rx="7" fill="#1d1640" stroke="#5a4d88"/><text x="516" y="163" fill="#9fb6ff" font-weight="700">Stabilizer</text><text x="640" y="163" fill="#a99fce">Clifford-only &#8212; <tspan fill="#7df0ff">millions</tspan> of qubits</text>
    <rect x="500" y="180" width="490" height="34" rx="7" fill="#1d1640" stroke="#5a4d88"/><text x="516" y="201" fill="#9fb6ff" font-weight="700">TensorNetwork</text><text x="640" y="201" fill="#a99fce">low-entanglement / structured circuits</text>
    <rect x="500" y="218" width="490" height="34" rx="7" fill="#1d1640" stroke="#5a4d88"/><text x="516" y="239" fill="#9fb6ff" font-weight="700">Clifford+T</text><text x="640" y="239" fill="#a99fce">near-Clifford with few T-gates</text>
    <rect x="500" y="256" width="490" height="34" rx="7" fill="#1d1640" stroke="#5a4d88"/><text x="516" y="277" fill="#9fb6ff" font-weight="700">Hardware profile</text><text x="640" y="277" fill="#a99fce">IBM / IonQ / Rigetti / Braket (sim fallback)</text>
  </g>

  <!-- payoff -->
  <rect x="40" y="304" width="920" height="58" rx="12" fill="#231a44" stroke="#5a4d88" stroke-width="1.2"/>
  <text x="60" y="330" fill="#ffd9f6" font-size="13" font-weight="700">You get: a feasible run where a naive simulator would have crashed.</text>
  <text x="60" y="350" fill="#a99fce" font-size="11.5">Honest note: Clifford+T isn&#8217;t in the auto-router yet, and the &#8220;millions of qubits&#8221; figure is Stabilizer-only (Clifford circuits).</text>
</svg>
