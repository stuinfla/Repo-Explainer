<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 360" width="100%" role="img" aria-labelledby="uc2-t uc2-d" style="max-width:1000px;height:auto;font-family:'Inter','IBM Plex Sans',system-ui,sans-serif;">
  <title id="uc2-t">QAOA: split a network into two best groups</title>
  <desc id="uc2-d">A 4-node ring graph goes through layers of QAOA, a quantum approximate optimizer, which returns a partition that colors the nodes into two groups and reports the cut value. It gives a hands-on feel for quantum approximate advantage on a classic NP-hard MaxCut problem.</desc>
  <defs>
    <linearGradient id="uc2-bg" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#181233"/><stop offset="1" stop-color="#120e26"/></linearGradient>
    <marker id="uc2-ar" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#ff3df0"/></marker>
  </defs>
  <rect width="1000" height="360" rx="16" fill="url(#uc2-bg)"/>
  <text x="500" y="38" text-anchor="middle" fill="#f3eefb" font-size="19" font-weight="700">Optimization (MaxCut) &#8212; find the best way to split a network</text>
  <text x="500" y="60" text-anchor="middle" fill="#7df0ff" font-size="12" font-family="'IBM Plex Mono',ui-monospace,monospace">npx @ruvector/ruqu qaoa --nodes 4</text>

  <!-- ring graph (before, undecided) -->
  <text x="170" y="100" text-anchor="middle" fill="#9a8fc4" font-size="12" font-weight="700">A 4-node ring</text>
  <g stroke="#6b6390" stroke-width="2">
    <line x1="120" y1="160" x2="220" y2="160"/><line x1="220" y1="160" x2="220" y2="260"/>
    <line x1="220" y1="260" x2="120" y2="260"/><line x1="120" y1="260" x2="120" y2="160"/>
  </g>
  <g>
    <circle cx="120" cy="160" r="18" fill="#4a3f70"/><circle cx="220" cy="160" r="18" fill="#4a3f70"/>
    <circle cx="220" cy="260" r="18" fill="#4a3f70"/><circle cx="120" cy="260" r="18" fill="#4a3f70"/>
  </g>
  <text x="170" y="290" text-anchor="middle" fill="#a99fce" font-size="10">which split cuts the most edges?</text>

  <!-- QAOA layers -->
  <line x1="252" y1="210" x2="300" y2="210" stroke="#ff3df0" stroke-width="2.2" marker-end="url(#uc2-ar)"/>
  <rect x="320" y="140" width="200" height="140" rx="12" fill="#1d1640" stroke="#ff3df0" stroke-width="1.4"/>
  <text x="420" y="166" text-anchor="middle" fill="#ff5cf2" font-size="13" font-weight="700">QAOA layers</text>
  <g font-family="'IBM Plex Mono',ui-monospace,monospace" font-size="10.5">
    <rect x="340" y="178" width="160" height="22" rx="5" fill="#231a44" stroke="#8b5cff"/><text x="420" y="193" text-anchor="middle" fill="#cdc2ee">cost layer  (&#947;)</text>
    <rect x="340" y="204" width="160" height="22" rx="5" fill="#231a44" stroke="#39e8ff"/><text x="420" y="219" text-anchor="middle" fill="#bfe9ff">mixer layer (&#946;)</text>
    <rect x="340" y="230" width="160" height="22" rx="5" fill="#231a44" stroke="#8b5cff"/><text x="420" y="245" text-anchor="middle" fill="#cdc2ee">repeat &#215; p</text>
  </g>
  <text x="420" y="270" text-anchor="middle" fill="#a99fce" font-size="10">tune the angles to push toward a good split</text>

  <line x1="532" y1="210" x2="580" y2="210" stroke="#ff3df0" stroke-width="2.2" marker-end="url(#uc2-ar)"/>

  <!-- result: two-group coloring -->
  <text x="690" y="100" text-anchor="middle" fill="#ff5cf2" font-size="12" font-weight="700">A two-group split</text>
  <g stroke="#6b6390" stroke-width="2">
    <line x1="640" y1="160" x2="740" y2="160"/><line x1="740" y1="160" x2="740" y2="260"/>
    <line x1="740" y1="260" x2="640" y2="260"/><line x1="640" y1="260" x2="640" y2="160"/>
  </g>
  <!-- cut edges highlighted -->
  <line x1="640" y1="160" x2="740" y2="160" stroke="#ff3df0" stroke-width="3"/>
  <line x1="740" y1="260" x2="640" y2="260" stroke="#ff3df0" stroke-width="3"/>
  <g>
    <circle cx="640" cy="160" r="18" fill="#ff3df0"/><circle cx="740" cy="160" r="18" fill="#39e8ff"/>
    <circle cx="740" cy="260" r="18" fill="#ff3df0"/><circle cx="640" cy="260" r="18" fill="#39e8ff"/>
  </g>
  <text x="690" y="295" text-anchor="middle" fill="#a99fce" font-size="10">magenta group vs cyan group</text>

  <!-- payoff -->
  <rect x="812" y="120" width="160" height="160" rx="10" fill="#231a44" stroke="#ff3df0" stroke-width="1.5"/>
  <text x="892" y="150" text-anchor="middle" fill="#f3eefb" font-size="13" font-weight="700">You get</text>
  <text x="892" y="176" text-anchor="middle" fill="#7df0ff" font-size="12">a partition +</text>
  <text x="892" y="194" text-anchor="middle" fill="#7df0ff" font-size="12">its cut value</text>
  <text x="892" y="224" text-anchor="middle" fill="#d8cff0" font-size="11">a feel for quantum</text>
  <text x="892" y="240" text-anchor="middle" fill="#d8cff0" font-size="11">approximate advantage</text>
  <text x="892" y="264" text-anchor="middle" fill="#a99fce" font-size="10">no math PhD needed</text>
</svg>
