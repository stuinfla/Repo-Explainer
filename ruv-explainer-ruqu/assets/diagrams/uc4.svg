<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 360" width="100%" role="img" aria-labelledby="uc4-t uc4-d" style="max-width:1000px;height:auto;font-family:'Inter','IBM Plex Sans',system-ui,sans-serif;">
  <title id="uc4-t">Surface-code error correction</title>
  <desc id="uc4-d">A clean distance-3 lattice of qubits gets realistic noise injected, scattering red error dots. The code measures tell-tale syndromes, then a minimum-weight perfect-matching decoder pairs them up and corrects them, recovering a clean lattice. You can inspect the before, the detected syndromes, and the recovered state.</desc>
  <defs>
    <linearGradient id="uc4-bg" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#181233"/><stop offset="1" stop-color="#120e26"/></linearGradient>
    <marker id="uc4-ar" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#ff3df0"/></marker>
  </defs>
  <rect width="1000" height="360" rx="16" fill="url(#uc4-bg)"/>
  <text x="500" y="36" text-anchor="middle" fill="#f3eefb" font-size="19" font-weight="700">Error correction &#8212; how quantum survives its own mistakes</text>
  <text x="500" y="58" text-anchor="middle" fill="#7df0ff" font-size="11.5" font-family="'IBM Plex Mono',ui-monospace,monospace">SurfaceCode::new(distance:3) &#183; apply_noise(.., 0.01) &#183; Decoder::mwpm().correct(..)</text>

  <!-- helper: a 3x3 lattice macro is drawn manually per panel -->
  <!-- clean -->
  <text x="150" y="92" text-anchor="middle" fill="#3ddc84" font-size="12" font-weight="700">1 &#183; CLEAN lattice (d=3)</text>
  <g>
    <g stroke="#4a3f70" stroke-width="1.4">
      <line x1="80" y1="130" x2="220" y2="130"/><line x1="80" y1="180" x2="220" y2="180"/><line x1="80" y1="230" x2="220" y2="230"/>
      <line x1="80" y1="130" x2="80" y2="230"/><line x1="130" y1="130" x2="130" y2="230"/><line x1="170" y1="130" x2="170" y2="230"/><line x1="220" y1="130" x2="220" y2="230"/>
    </g>
    <g fill="#5cffaa">
      <circle cx="80" cy="130" r="6"/><circle cx="130" cy="130" r="6"/><circle cx="170" cy="130" r="6"/><circle cx="220" cy="130" r="6"/>
      <circle cx="80" cy="180" r="6"/><circle cx="130" cy="180" r="6"/><circle cx="170" cy="180" r="6"/><circle cx="220" cy="180" r="6"/>
      <circle cx="80" cy="230" r="6"/><circle cx="130" cy="230" r="6"/><circle cx="170" cy="230" r="6"/><circle cx="220" cy="230" r="6"/>
    </g>
  </g>
  <text x="150" y="262" text-anchor="middle" fill="#a99fce" font-size="10">a logical qubit, encoded</text>

  <line x1="236" y1="180" x2="270" y2="180" stroke="#ff3df0" stroke-width="2.2" marker-end="url(#uc4-ar)"/>

  <!-- noisy + syndromes -->
  <text x="370" y="92" text-anchor="middle" fill="#ff8fa3" font-size="12" font-weight="700">2 &#183; NOISE + syndromes</text>
  <g>
    <g stroke="#4a3f70" stroke-width="1.4">
      <line x1="300" y1="130" x2="440" y2="130"/><line x1="300" y1="180" x2="440" y2="180"/><line x1="300" y1="230" x2="440" y2="230"/>
      <line x1="300" y1="130" x2="300" y2="230"/><line x1="350" y1="130" x2="350" y2="230"/><line x1="390" y1="130" x2="390" y2="230"/><line x1="440" y1="130" x2="440" y2="230"/>
    </g>
    <g fill="#5cffaa">
      <circle cx="300" cy="130" r="6"/><circle cx="390" cy="130" r="6"/><circle cx="440" cy="130" r="6"/>
      <circle cx="300" cy="180" r="6"/><circle cx="390" cy="180" r="6"/>
      <circle cx="300" cy="230" r="6"/><circle cx="350" cy="230" r="6"/><circle cx="440" cy="230" r="6"/>
    </g>
    <!-- errors (red) -->
    <circle cx="350" cy="130" r="7" fill="#ff5c7a"/><circle cx="440" cy="180" r="7" fill="#ff5c7a"/><circle cx="390" cy="230" r="7" fill="#ff5c7a"/>
    <!-- syndrome flags (amber diamonds) -->
    <rect x="364" y="152" width="12" height="12" fill="#ffc83d" transform="rotate(45 370 158)"/>
    <rect x="404" y="202" width="12" height="12" fill="#ffc83d" transform="rotate(45 410 208)"/>
  </g>
  <text x="370" y="262" text-anchor="middle" fill="#a99fce" font-size="10">red = errors &#183; amber = detected syndromes</text>

  <line x1="456" y1="180" x2="490" y2="180" stroke="#ff3df0" stroke-width="2.2" marker-end="url(#uc4-ar)"/>

  <!-- mwpm matching + recovered -->
  <text x="590" y="92" text-anchor="middle" fill="#7df0ff" font-size="12" font-weight="700">3 &#183; MWPM matches &#38; corrects</text>
  <g>
    <g stroke="#4a3f70" stroke-width="1.4">
      <line x1="520" y1="130" x2="660" y2="130"/><line x1="520" y1="180" x2="660" y2="180"/><line x1="520" y1="230" x2="660" y2="230"/>
      <line x1="520" y1="130" x2="520" y2="230"/><line x1="570" y1="130" x2="570" y2="230"/><line x1="610" y1="130" x2="610" y2="230"/><line x1="660" y1="130" x2="660" y2="230"/>
    </g>
    <g fill="#5cffaa">
      <circle cx="520" cy="130" r="6"/><circle cx="570" cy="130" r="6"/><circle cx="610" cy="130" r="6"/><circle cx="660" cy="130" r="6"/>
      <circle cx="520" cy="180" r="6"/><circle cx="570" cy="180" r="6"/><circle cx="610" cy="180" r="6"/><circle cx="660" cy="180" r="6"/>
      <circle cx="520" cy="230" r="6"/><circle cx="570" cy="230" r="6"/><circle cx="610" cy="230" r="6"/><circle cx="660" cy="230" r="6"/>
    </g>
    <!-- matching line -->
    <path d="M590 158 Q 600 185, 630 208" fill="none" stroke="#ff3df0" stroke-width="2" stroke-dasharray="4 3"/>
  </g>
  <text x="590" y="262" text-anchor="middle" fill="#a99fce" font-size="10">minimum-weight perfect matching pairs syndromes</text>

  <!-- payoff -->
  <rect x="700" y="112" width="280" height="180" rx="10" fill="#231a44" stroke="#39e8ff" stroke-width="1.5"/>
  <text x="840" y="142" text-anchor="middle" fill="#bff3ff" font-size="13" font-weight="700">A before/after you can inspect</text>
  <text x="720" y="174" fill="#d8cff0" font-size="11.5">&#9679; corrupted state</text>
  <text x="720" y="200" fill="#d8cff0" font-size="11.5">&#9670; detected syndromes</text>
  <text x="720" y="226" fill="#d8cff0" font-size="11.5">&#10003; recovered clean lattice</text>
  <text x="720" y="262" fill="#a99fce" font-size="11">Learn <tspan fill="#ff8cf2" font-weight="700">why</tspan> quantum machines</text>
  <text x="720" y="280" fill="#a99fce" font-size="11">need error correction &#8212; hands-on.</text>
</svg>
