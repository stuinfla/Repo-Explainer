<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 640" width="100%" role="img" aria-labelledby="dropin-t dropin-d" style="max-width:1000px;height:auto;font-family:'Inter','IBM Plex Sans',system-ui,sans-serif;">
  <title id="dropin-t">What is actually inside the ruqu drop-in kit</title>
  <desc id="dropin-d">An annotated file tree of the ruqu-dropin.zip download, one folder with two halves. for-humans holds the plain-English primer plus a highlighted studio folder containing a NotebookLM audio overview to play first, a written report, and the prompt that made them. for-ai holds a single ruqu-kb.rvf brain (384-dim bge-small), its idmap and embed sidecars, a passages JSONL of every doc and all source, an ids index, an ask-kb command-line tool, a kb-mcp-server to wire it into Claude Code or Cursor, the kb.config and resolve-deps modules, and a package.json. Plus a README and manifest. Each file is labeled with a plain-English what-this-is.</desc>
  <defs>
    <linearGradient id="dropin-bg" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#181233"/><stop offset="1" stop-color="#120e26"/></linearGradient>
    <linearGradient id="dropin-mag" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#ff3df0"/><stop offset="1" stop-color="#8b5cff"/></linearGradient>
    <linearGradient id="dropin-studio" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#7df0ff"/><stop offset="1" stop-color="#39e8ff"/></linearGradient>
  </defs>
  <rect width="1000" height="640" rx="16" fill="url(#dropin-bg)"/>
  <text x="500" y="40" text-anchor="middle" fill="#f3eefb" font-size="21" font-weight="700">What&#8217;s actually inside the download</text>
  <text x="500" y="63" text-anchor="middle" fill="#b9aee0" font-size="13"><tspan font-family="'IBM Plex Mono',ui-monospace,monospace" fill="#7df0ff">ruqu-dropin.zip</tspan> &#8212; one folder, two halves: one for you, one for your AI</text>

  <!-- root -->
  <text x="60" y="104" fill="#ff8cf2" font-size="15" font-weight="700" font-family="'IBM Plex Mono',ui-monospace,monospace">ruqu-dropin/</text>
  <text x="200" y="104" fill="#a99fce" font-size="12">the one download &#183; unzip into your project as <tspan fill="#cdc2ee" font-family="monospace">kb/</tspan></text>

  <!-- for-humans half -->
  <rect x="44" y="120" width="912" height="186" rx="12" fill="#1c2444" stroke="#39e8ff" stroke-width="1.3"/>
  <text x="68" y="146" fill="#bff3ff" font-size="14" font-weight="700" font-family="'IBM Plex Mono',ui-monospace,monospace">&#9500;&#9472; for-humans/</text>
  <text x="300" y="146" fill="#a9c8e0" font-size="12">read &amp; listen first &#8212; understand the tool</text>
  <g font-family="'IBM Plex Mono',ui-monospace,monospace" font-size="12.5">
    <text x="96" y="176" fill="#cdc2ee">&#9500;&#9472; ruqu-primer.md</text>
    <text x="96" y="206" fill="#bff3ff" font-weight="700">&#9492;&#9472; studio/</text>
  </g>
  <text x="360" y="176" fill="#d8cff0" font-size="12">&#8212; the whole tool, in plain English (the comprehension arc)</text>
  <!-- studio highlight band -->
  <rect x="120" y="218" width="836" height="58" rx="9" fill="#10283a" stroke="url(#dropin-studio)" stroke-width="1.4"/>
  <g font-family="'IBM Plex Mono',ui-monospace,monospace" font-size="12.5">
    <text x="140" y="240" fill="#7df0ff" font-weight="700">&#127911; ruqu-audio.m4a</text>
    <text x="140" y="264" fill="#7df0ff" font-weight="700">&#128196; ruqu-report.md</text>
  </g>
  <g font-size="12">
    <text x="360" y="240" fill="#bff3ff" font-weight="700">&#8212; NotebookLM audio overview &#183; <tspan fill="#7df0ff">play this first</tspan> (warm, jargon-free)</text>
    <text x="360" y="264" fill="#d8cff0">&#8212; the written deep-dive briefing (themes &#183; quotes &#183; honest limits)</text>
  </g>
  <text x="68" y="296" fill="#7d739e" font-size="11.5">The studio media rides <tspan fill="#9fb8d8" font-weight="700">inside the zip</tspan> &#8212; not just on the site. Start with the &#127911; audio overview.</text>

  <!-- for-ai half -->
  <rect x="44" y="320" width="912" height="252" rx="12" fill="#1d1640" stroke="#ff3df0" stroke-width="1.4"/>
  <text x="68" y="346" fill="#ff5cf2" font-size="14" font-weight="700" font-family="'IBM Plex Mono',ui-monospace,monospace">&#9500;&#9472; for-ai/</text>
  <text x="260" y="346" fill="#d8cff0" font-size="12">point your assistant here so it answers from the real source, not guesses</text>
  <g font-family="'IBM Plex Mono',ui-monospace,monospace" font-size="12.5">
    <text x="96" y="374" fill="#ff8cf2" font-weight="700">&#9500;&#9472; ruqu-kb.rvf</text>
    <text x="96" y="398" fill="#cdc2ee">&#9500;&#9472; ruqu-kb.passages.jsonl</text>
    <text x="96" y="422" fill="#cdc2ee">&#9500;&#9472; ruqu-kb.ids.json</text>
    <text x="96" y="446" fill="#cdc2ee">&#9500;&#9472; ask-kb.mjs</text>
    <text x="96" y="470" fill="#cdc2ee">&#9500;&#9472; kb-mcp-server.mjs</text>
    <text x="96" y="494" fill="#cdc2ee">&#9500;&#9472; kb.config.mjs</text>
    <text x="96" y="518" fill="#cdc2ee">&#9492;&#9472; package.json</text>
  </g>
  <g font-size="12">
    <text x="392" y="374" fill="#d8cff0">&#8212; the &#8220;brain&#8221; &#8212; one 384-dim bge-small vector DB (HNSW), runs anywhere Node 18+ does</text>
    <text x="392" y="398" fill="#d8cff0">&#8212; every doc + all source, full text, joined to each hit by id</text>
    <text x="392" y="422" fill="#d8cff0">&#8212; per-passage kind + preview index</text>
    <text x="392" y="446" fill="#d8cff0">&#8212; ask it a question from the command line</text>
    <text x="392" y="470" fill="#d8cff0">&#8212; wire it straight into Claude Code / Cursor (one MCP server)</text>
    <text x="392" y="494" fill="#d8cff0">&#8212; routing config + <tspan fill="#a99fce">resolve-deps.mjs</tspan> (portable dep loader)</text>
    <text x="392" y="518" fill="#d8cff0">&#8212; two deps; <tspan fill="#cdc2ee" font-family="monospace">npm i</tspan> then <tspan fill="#cdc2ee" font-family="monospace">node ask-kb.mjs ruqu &#8230;</tspan></text>
  </g>
  <text x="68" y="552" fill="#7d739e" font-size="11.5">One RVF file [recipe v1.3.1] &#8212; 384-dim <tspan fill="#9fb8d8">Xenova/bge-small-en-v1.5</tspan>: lightest, fastest, passed its answer-quality gate before shipping.</text>

  <!-- README -->
  <rect x="44" y="586" width="912" height="40" rx="10" fill="#231a44" stroke="#5a4d88" stroke-width="1.2"/>
  <text x="68" y="611" fill="#cdc2ee" font-size="12.5" font-family="'IBM Plex Mono',ui-monospace,monospace">&#9492;&#9472; README.md + manifest.json</text>
  <text x="380" y="611" fill="#d8cff0" font-size="12">&#8212; what it is + the 3-step setup, plus provenance (date &#183; source SHA &#183; model &#183; gate score)</text>
</svg>
