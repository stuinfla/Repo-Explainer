<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 400" width="100%" role="img" aria-labelledby="uc5-t uc5-d" style="max-width:1000px;height:auto;font-family:'Inter','IBM Plex Sans',system-ui,sans-serif;">
  <title id="uc5-t">The coherence engine: a real-time is-it-safe-to-act monitor</title>
  <desc id="uc5-d">Each cycle's syndrome data is fed into fabric.process_cycle. A real-time min-cut over the error pattern decides whether the machine is healthy, borderline, or collapsing, returning PERMIT, DEFER, or DENY before the next operation. Healthy regions keep running while a bad region is quarantined. In tests it flagged trouble a median of four cycles before failure with 85.7 percent recall, at 468 nanosecond P99 latency and 3.8 million decisions per second.</desc>
  <defs>
    <linearGradient id="uc5-bg" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#181233"/><stop offset="1" stop-color="#120e26"/></linearGradient>
    <marker id="uc5-ar" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#ff3df0"/></marker>
  </defs>
  <rect width="1000" height="400" rx="16" fill="url(#uc5-bg)"/>
  <text x="500" y="34" text-anchor="middle" fill="#f3eefb" font-size="19" font-weight="700">The coherence engine &#8212; &#8220;is it still safe to act?&#8221; (ruv&#8217;s original idea)</text>
  <text x="500" y="56" text-anchor="middle" fill="#7df0ff" font-size="11.5" font-family="'IBM Plex Mono',ui-monospace,monospace">fabric.process_cycle(syndrome_data) &#8594; Permit | Defer | Deny</text>

  <!-- 1 syndrome stream -->
  <text x="120" y="92" text-anchor="middle" fill="#9a8fc4" font-size="12" font-weight="700">1 &#183; syndrome stream</text>
  <rect x="40" y="108" width="160" height="180" rx="10" fill="#1d1640" stroke="#5a4d88" stroke-width="1.3"/>
  <g>
    <rect x="60" y="126" width="120" height="22" rx="4" fill="#140f2b" stroke="#3a2f66"/><text x="120" y="141" text-anchor="middle" fill="#cdc2ee" font-size="10" font-family="monospace">cycle t-2</text>
    <rect x="60" y="154" width="120" height="22" rx="4" fill="#140f2b" stroke="#3a2f66"/><text x="120" y="169" text-anchor="middle" fill="#cdc2ee" font-size="10" font-family="monospace">cycle t-1</text>
    <rect x="60" y="182" width="120" height="22" rx="4" fill="#2a1430" stroke="#ff5c7a"/><text x="120" y="197" text-anchor="middle" fill="#ff8fa3" font-size="10" font-family="monospace">cycle t  (errors&#8593;)</text>
  </g>
  <text x="120" y="232" text-anchor="middle" fill="#a99fce" font-size="10">each cycle = a snapshot</text>
  <text x="120" y="248" text-anchor="middle" fill="#a99fce" font-size="10">of where errors fired</text>
  <text x="120" y="270" text-anchor="middle" fill="#7d739e" font-size="9.5">fed in, cycle by cycle</text>

  <line x1="208" y1="198" x2="246" y2="198" stroke="#ff3df0" stroke-width="2.2" marker-end="url(#uc5-ar)"/>

  <!-- 2 min-cut over error graph -->
  <text x="380" y="92" text-anchor="middle" fill="#ff5cf2" font-size="12" font-weight="700">2 &#183; real-time min-cut on the error pattern</text>
  <rect x="262" y="108" width="236" height="180" rx="10" fill="#1d1640" stroke="#ff3df0" stroke-width="1.4"/>
  <!-- nodes -->
  <g stroke="#6b6390" stroke-width="1.4">
    <line x1="300" y1="150" x2="360" y2="140"/><line x1="360" y1="140" x2="420" y2="160"/>
    <line x1="300" y1="150" x2="320" y2="220"/><line x1="320" y1="220" x2="400" y2="230"/>
    <line x1="360" y1="140" x2="320" y2="220"/><line x1="420" y1="160" x2="400" y2="230"/>
  </g>
  <!-- the cut -->
  <path d="M340 120 Q 375 185, 350 260" fill="none" stroke="#39e8ff" stroke-width="2.4" stroke-dasharray="6 4"/>
  <text x="372" y="128" fill="#7df0ff" font-size="9.5">min-cut</text>
  <g>
    <circle cx="300" cy="150" r="9" fill="#5cffaa"/><circle cx="320" cy="220" r="9" fill="#5cffaa"/>
    <circle cx="360" cy="140" r="9" fill="#ffc83d"/>
    <circle cx="420" cy="160" r="9" fill="#ff5c7a"/><circle cx="400" cy="230" r="9" fill="#ff5c7a"/>
  </g>
  <text x="380" y="276" text-anchor="middle" fill="#a99fce" font-size="9.5">cheapest cut separating healthy from collapsing region</text>

  <line x1="506" y1="198" x2="544" y2="198" stroke="#ff3df0" stroke-width="2.2" marker-end="url(#uc5-ar)"/>

  <!-- 3 decision -->
  <text x="660" y="92" text-anchor="middle" fill="#9a8fc4" font-size="12" font-weight="700">3 &#183; decision, before the next op</text>
  <g font-family="'IBM Plex Mono',ui-monospace,monospace" font-size="12" font-weight="700">
    <rect x="560" y="112" width="200" height="40" rx="8" fill="#13351f" stroke="#3ddc84"/><text x="600" y="137" fill="#5cffaa">PERMIT</text><text x="660" y="137" fill="#bff3d8" font-size="10">healthy &#8212; keep running</text>
    <rect x="560" y="160" width="200" height="40" rx="8" fill="#3a3210" stroke="#ffc83d"/><text x="600" y="185" fill="#ffd96b">DEFER</text><text x="654" y="185" fill="#e6d49a" font-size="10">borderline &#8212; wait</text>
    <rect x="560" y="208" width="200" height="40" rx="8" fill="#3a1422" stroke="#ff5c7a"/><text x="600" y="233" fill="#ff8fa3">DENY</text><text x="650" y="233" fill="#e6a8b4" font-size="10">collapsing &#8212; quarantine</text>
  </g>
  <text x="660" y="276" text-anchor="middle" fill="#a99fce" font-size="10">healthy regions keep running; a bad region is isolated</text>

  <!-- measured stats bar -->
  <rect x="40" y="306" width="920" height="74" rx="12" fill="#231a44" stroke="#5a4d88" stroke-width="1.2"/>
  <text x="60" y="332" fill="#ffd9f6" font-size="13" font-weight="700">Measured (vendor, Apple M2 / specified conditions &#8212; indicative, not independently audited):</text>
  <g font-family="'IBM Plex Mono',ui-monospace,monospace" font-size="12.5">
    <text x="60" y="362" fill="#7df0ff">&#9679; median 4 cycles&#8217; early warning</text>
    <text x="330" y="362" fill="#7df0ff">&#9679; 85.7% recall</text>
    <text x="500" y="362" fill="#7df0ff">&#9679; 468 ns P99 latency</text>
    <text x="730" y="362" fill="#7df0ff">&#9679; 3.8M decisions / sec</text>
  </g>
</svg>
