<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" role="img" aria-label="explainmyrepo — a prism refracting code into a clear spectrum">
  <!-- Mark: a dark tile holding a prism that refracts a single beam into a
       full spectrum — the brand metaphor (dense code in, clarity out). -->
  <defs>
    <linearGradient id="em-spec" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"  stop-color="#8b7dff"/>
      <stop offset="45%" stop-color="#3df2c7"/>
      <stop offset="100%" stop-color="#ff7aa2"/>
    </linearGradient>
  </defs>
  <rect width="32" height="32" rx="8" fill="#0b0d14"/>
  <!-- prism -->
  <path d="M12.5 8 L22 16 L12.5 24 Z" fill="rgba(61,242,199,.06)" stroke="url(#em-spec)" stroke-width="2" stroke-linejoin="round"/>
  <!-- refracted spectrum fan -->
  <path d="M22 16 L28 12.5" stroke="#8b7dff" stroke-width="1.7" stroke-linecap="round"/>
  <path d="M22 16 L28 16"   stroke="#3df2c7" stroke-width="1.7" stroke-linecap="round"/>
  <path d="M22 16 L28 19.5" stroke="#ff7aa2" stroke-width="1.7" stroke-linecap="round"/>
</svg>
