<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 454 531" width="454" height="531" role="img" aria-labelledby="diagram-title diagram-desc">
  <title id="diagram-title">agenticow - Big Idea</title>
  <desc id="diagram-desc">The big idea, contrasting two approaches. Old way: every other vector store snapshots a 1,000,000-vector, 496 MB base by full-copying it — 496 MB and 67 ms every single time, so 1,000 branches cost 484 GB. agenticow: copy-on-write — a branch holds only your edits plus a pointer to the base, so it costs 162 bytes and 0.5 ms flat, a query sees base union edits, and 1,000 branches cost about 10.5 MB total, 943 times less disk.</desc>
  <defs>
    <style>
      .bg { fill: #0e1a18; stroke: #1f3a35; stroke-width: 1.5px; }
      .ln { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace; font-size: 17px; font-weight: 500; fill: #eafff8; white-space: pre; }
      .hd { fill: #3fe0c5; font-weight: 700; }
    </style>
  </defs>
  <rect class="bg" x="1" y="1" width="452" height="529" rx="10"/>
  <text class="ln hd" x="28" y="48" xml:space="preserve">The big idea — branch it, don't copy it</text>
  <text class="ln" x="28" y="73" xml:space="preserve"></text>
  <text class="ln" x="28" y="98" xml:space="preserve">OLD WAY · every other vector store</text>
  <text class="ln" x="28" y="123" xml:space="preserve">  ┌────────────────────────────────┐</text>
  <text class="ln" x="28" y="148" xml:space="preserve">  │ base: 1,000,000 vecs · 496 MB  │</text>
  <text class="ln" x="28" y="173" xml:space="preserve">  │ snapshot = FULL COPY           │</text>
  <text class="ln" x="28" y="198" xml:space="preserve">  │ → 496 MB + 67 ms  EVERY time   │</text>
  <text class="ln" x="28" y="223" xml:space="preserve">  │ 1,000 branches  =  484 GB      │</text>
  <text class="ln" x="28" y="248" xml:space="preserve">  └────────────────────────────────┘</text>
  <text class="ln" x="28" y="273" xml:space="preserve"></text>
  <text class="ln" x="28" y="298" xml:space="preserve">agenticow · copy-on-write</text>
  <text class="ln" x="28" y="323" xml:space="preserve">  ┌────────────────────────────────┐</text>
  <text class="ln" x="28" y="348" xml:space="preserve">  │ base ●── pointer ──◌ branch    │</text>
  <text class="ln" x="28" y="373" xml:space="preserve">  │ branch = my edits only         │</text>
  <text class="ln" x="28" y="398" xml:space="preserve">  │ → 162 bytes + 0.5 ms  (flat)   │</text>
  <text class="ln" x="28" y="423" xml:space="preserve">  │ query sees  base ∪ edits       │</text>
  <text class="ln" x="28" y="448" xml:space="preserve">  │ 1,000 branches = ~10.5 MB      │</text>
  <text class="ln" x="28" y="473" xml:space="preserve">  │                (943× less)     │</text>
  <text class="ln" x="28" y="498" xml:space="preserve">  └────────────────────────────────┘</text>
</svg>
