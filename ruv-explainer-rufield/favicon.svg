<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" role="img" aria-label="RuField — a violet field-wave on slate">
  <!-- Hand-authored RuField mark: a signal/field waveform rippling on deep slate.
       Signal-violet -> magenta. ZERO amber, ZERO cyan. Distinct per Constraint K. -->
  <defs>
    <linearGradient id="rf-wave" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"  stop-color="#7c5cff"/>
      <stop offset="50%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#e84ef0"/>
    </linearGradient>
    <radialGradient id="rf-glow" cx="50%" cy="50%" r="55%">
      <stop offset="0%"  stop-color="#a855f7" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#a855f7" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- slate field -->
  <rect width="32" height="32" rx="7" fill="#11131c"/>
  <!-- soft field glow -->
  <circle cx="16" cy="16" r="13" fill="url(#rf-glow)"/>
  <!-- concentric field ripples (the 'field') -->
  <circle cx="9" cy="16" r="3.4" fill="none" stroke="#a855f7" stroke-opacity="0.40" stroke-width="1"/>
  <circle cx="9" cy="16" r="6.0" fill="none" stroke="#a855f7" stroke-opacity="0.22" stroke-width="1"/>
  <!-- the waveform (the 'signal') -->
  <path d="M3 16 C 8 5, 12 27, 16 16 S 24 5, 29 16"
        fill="none" stroke="url(#rf-wave)" stroke-width="2.4"
        stroke-linecap="round"/>
</svg>
